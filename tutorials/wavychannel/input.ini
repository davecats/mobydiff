[grid]
nx = 400          ; number of points in the streamwise direction
ny = 400          ; number of points in the wall-normal direction
nz = 400          ; number of points in the spanwise direction
lx = 1.0
ly = 1.0
lz = 1.0

[flow]
re = 100.0

[time]
dt = 1.0e-4       ; use 1.0e-3 for no-IBM runs if desired
nsteps = 3
cflmax = 0.0
dtmax = 1.0e-3

[pressure]
niter = 3          ; red-black SOR iterations, ignored by FFT backends

[output]
interval = 0       ; use 0 to disable VTK output
prefix = data
