[grid]
nx = 200          ; number of points in the streamwise direction
ny = 200          ; number of points in the wall-normal direction
nz = 200          ; number of points in the spanwise direction
lx = 1.0
ly = 1.0
lz = 1.0

[flow]
re = 100.0
forcing_x = 1.0
forcing_y = 0.0
forcing_z = 0.0

[time]
dt = 1.0e-4       ; use 1.0e-3 for no-IBM runs if desired
nsteps = 3
cflmax = 0.0
dtmax = 1.0e-3

[pressure]
niter = 3          ; red-black SOR iterations, ignored by FFT backends

[boundary]
periodic_x = true
periodic_y = false
periodic_z = true

y_min_p_type = neumann
y_max_p_type = neumann

[output]
interval = 0       ; use 0 to disable VTK output
prefix = data
field_interval = 0 ; use >0 to write full staggered fields in HDF5
field_prefix = field
